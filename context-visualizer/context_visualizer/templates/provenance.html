{% extends "base.html" %}
{% block title %}Provenance - Event Flow{% endblock %}
{% block head %}
<script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
<style>
    .provenance-container { display: flex; gap: 20px; padding: 20px; height: calc(100vh - 80px); }
    .session-panel { width: 250px; flex-shrink: 0; overflow-y: auto; }
    .main-panel { flex: 1; display: flex; flex-direction: column; gap: 15px; overflow-y: auto; }
    .session-list { list-style: none; padding: 0; margin: 0; }
    .session-item { padding: 10px 12px; border: 1px solid #333; border-radius: 6px; margin-bottom: 6px; cursor: pointer; background: #1a1a2e; transition: background 0.2s; }
    .session-item:hover { background: #16213e; }
    .session-item.active { background: #0f3460; border-color: #e94560; }
    .session-item .session-id { font-weight: bold; font-size: 0.9em; color: #eee; word-break: break-all; }
    .session-item .session-count { font-size: 0.8em; color: #888; margin-top: 4px; }
    .no-data { color: #666; text-align: center; padding: 40px; font-style: italic; }
    .session-child { margin-left: 16px; border-left: 2px solid #333; padding-left: 8px; }
    .session-child .session-id::before { content: "↳ "; color: #666; }
    h3 { margin: 0 0 10px 0; color: #eee; font-size: 1em; }
    .live-indicator { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #4caf50; margin-right: 6px; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ── Event flow ─────────────────────────────────────────── */
    .event-flow-panel { background: #1a1a2e; border-radius: 8px; padding: 12px; }
    .event-flow-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .event-flow { display: flex; flex-direction: column; gap: 4px; }
    .ef-item { border: 1px solid #2a2a3e; border-radius: 6px; background: #13131f; overflow: hidden; }
    .ef-item.ef-child-item { border-color: #1e3a5f; background: #0d1a2d; margin-left: 18px; }
    .ef-item.ef-child-item .ef-row { border-left: 3px solid #1e40af; }
    .ef-row { display: flex; align-items: center; gap: 8px; padding: 7px 10px; cursor: pointer; user-select: none; }
    .ef-row:hover { background: #1a2040; }
    .ef-seq { color: #555; font-size: 0.78em; min-width: 26px; font-variant-numeric: tabular-nums; }
    .ef-badge { padding: 1px 7px; border-radius: 3px; font-size: 0.73em; font-weight: bold; white-space: nowrap; }
    .badge-start { background: #1b5e20; color: #a5d6a7; }
    .badge-continuation { background: #1565c0; color: #90caf9; }
    .badge-tool { background: #b45309; color: #fde68a; }
    .badge-compression { background: #880e4f; color: #f48fb1; }
    .ef-model { color: #888; font-size: 0.78em; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .ef-stop { color: #555; font-size: 0.75em; margin-left: auto; white-space: nowrap; }
    .ef-metrics { display: flex; gap: 10px; align-items: center; flex-shrink: 0; }
    .ef-tok-in { color: #42a5f5; font-size: 0.78em; font-variant-numeric: tabular-nums; }
    .ef-tok-out { color: #66bb6a; font-size: 0.78em; font-variant-numeric: tabular-nums; }
    .ef-lat { color: #ff9800; font-size: 0.78em; font-variant-numeric: tabular-nums; }
    .ef-chevron { color: #444; font-size: 0.75em; margin-left: 4px; transition: transform 0.15s; }
    .ef-item.open .ef-chevron { transform: rotate(90deg); }
    .ef-tools { padding: 0 10px 8px 36px; display: flex; flex-direction: column; gap: 3px; }
    .ef-tool { font-size: 0.78em; color: #aaa; display: flex; gap: 6px; align-items: baseline; }
    .ef-tool-name { color: #fbbf24; }
    .ef-tool-input { color: #666; font-style: italic; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 400px; }
    .ef-detail { padding: 8px 10px 8px 36px; border-top: 1px solid #1e1e2e; }
    .ef-detail-text { font-size: 0.78em; color: #888; font-family: monospace; white-space: pre-wrap; word-break: break-word; max-height: 160px; overflow-y: auto; }
    .ef-subagent-header { display: flex; align-items: center; gap: 8px; padding: 8px 4px 4px; color: #1d4ed8; font-size: 0.8em; border-top: 1px dashed #1e3a5f; margin-top: 6px; cursor: pointer; }
    .ef-subagent-header:hover { color: #60a5fa; }
    .ef-subagent-body { display: flex; flex-direction: column; gap: 4px; }
    .ef-subagent-body.collapsed { display: none; }

    /* ── Analysis charts ───────────────────────────────────── */
    .charts-panel { background: #1e1e2e; border-radius: 8px; padding: 10px; margin-bottom: 12px; }
    .charts-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .charts-tabs { display: flex; gap: 4px; }
    .charts-tab-btn { padding: 4px 14px; border: 1px solid #333; border-radius: 4px; background: transparent; color: #aaa; cursor: pointer; font-size: 0.8em; }
    .charts-tab-btn.active { background: #0f3460; border-color: #53d8fb; color: #eee; }
    .charts-tab-content { display: none; }
    .charts-tab-content.active { display: block; }
    .charts-grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .chart-sub { min-height: 240px; }
    .chart-full { min-height: 280px; margin-bottom: 12px; }
    .charts-refresh { padding: 3px 10px; font-size: 0.8em; border: 1px solid #333; border-radius: 4px; background: transparent; color: #aaa; cursor: pointer; }
    .charts-refresh:hover { border-color: #53d8fb; color: #eee; }
    .token-stats-panel { background: #13131f; border-radius: 6px; padding: 8px 10px; }
    .token-stats-panel h4 { margin: 0 0 6px 0; color: #aaa; font-size: 0.8em; font-weight: normal; letter-spacing: 0.05em; text-transform: uppercase; }
    .token-stats-table { width: 100%; border-collapse: collapse; font-size: 0.82em; }
    .token-stats-table th { color: #666; font-weight: normal; text-align: right; padding: 2px 10px 4px; border-bottom: 1px solid #2a2a3e; }
    .token-stats-table th:first-child { text-align: left; }
    .token-stats-table td { color: #ccc; text-align: right; padding: 2px 10px; border-bottom: 1px solid #1a1a2e; }
    .token-stats-table td:first-child { text-align: left; color: #888; }
    .token-stats-table tr:last-child td { border-bottom: none; }
    .token-stats-scroll { max-height: 180px; overflow-y: auto; }
    .tok-in { color: #42a5f5; }
    .tok-out { color: #66bb6a; }
</style>
{% endblock %}

{% block content %}
<div class="provenance-container">
    <div class="session-panel">
        <h3>Agent Sessions</h3>
        <ul class="session-list" id="session-list">
            <li class="no-data">Loading...</li>
        </ul>
    </div>
    <div class="main-panel">
        <div class="event-flow-panel">
            <div class="event-flow-header">
                <h3><span class="live-indicator" id="live-dot" style="display:none;"></span>Event Flow</h3>
                <span id="flow-session" style="color:#555; font-size:0.8em;"></span>
            </div>
            <div id="event-flow">
                <div class="no-data">Select a session to view event flow</div>
            </div>
        </div>
        <div class="charts-panel">
          <div class="charts-header">
            <div class="charts-tabs">
              <button class="charts-tab-btn active" data-tab="overview">Overview</button>
              <button class="charts-tab-btn" data-tab="context-detail">Context Detail</button>
            </div>
            <button class="charts-refresh" id="charts-refresh">&#8635; Refresh</button>
          </div>
          <div class="charts-tab-content active" id="tab-overview">
            <div class="charts-grid-2col">
              <div class="chart-sub" id="chart-context-growth"></div>
              <div class="chart-sub" id="chart-latency"></div>
              <div class="chart-sub" id="chart-cumulative-cost"></div>
              <div class="chart-sub" id="chart-latency-histogram"></div>
              <div class="token-stats-panel" id="chart-token-usage" style="grid-column: 1 / -1;"></div>
            </div>
          </div>
          <div class="charts-tab-content" id="tab-context-detail">
            <div class="chart-full" id="chart-context-composition"></div>
            <div class="chart-full" id="chart-token-deltas"></div>
          </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/provenance.js') }}"></script>
{% endblock %}
