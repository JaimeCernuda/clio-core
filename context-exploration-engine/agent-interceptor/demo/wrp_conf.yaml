# DTProvenance compose configuration
# Starts all ChiMods for the agent interception pipeline.
#
# Usage: ./dt_demo_server --config demo/wrp_conf.yaml

# Memory segment configuration
memory:
  main_segment_size: auto
  client_data_segment_size: 2GB
  runtime_data_segment_size: 2GB

# Network configuration
networking:
  port: 9513
  neighborhood_size: 32

# Runtime configuration
runtime:
  num_threads: 8
  queue_depth: 1024
  local_sched: "default"
  heartbeat_interval: 1000

compose:
  # CTE for persistent context storage (must come before tracker/untangler)
  - mod_name: wrp_cte_core
    pool_name: cte_main
    pool_query: local
    pool_id: "512.0"
    storage:
      - path: "ram::cte_ram_tier1"
        bdev_type: "ram"
        capacity_limit: "256MB"
        score: 1.0
    dpe:
      dpe_type: "max_bw"
    targets:
      neighborhood: 1

  # LLM Proxy — Monitor-based dispatch (Flask bridge handles HTTP)
  - mod_name: dt_provenance_dt_proxy
    pool_name: dt_provenance_dt_proxy
    pool_query: local
    pool_id: "800.0"

  # Anthropic Interception — forwards to api.anthropic.com
  - mod_name: dt_provenance_dt_intercept_anthropic
    pool_name: dt_provenance_dt_intercept_anthropic
    pool_query: local
    pool_id: "801.0"
    config: |
      upstream_base_url: "https://api.anthropic.com"

  # OpenAI Interception — forwards to api.openai.com
  - mod_name: dt_provenance_dt_intercept_openai
    pool_name: dt_provenance_dt_intercept_openai
    pool_query: local
    pool_id: "802.0"
    config: |
      upstream_base_url: "https://api.openai.com"

  # Ollama Interception — forwards to local Ollama instance
  - mod_name: dt_provenance_dt_intercept_ollama
    pool_name: dt_provenance_dt_intercept_ollama
    pool_query: local
    pool_id: "803.0"
    config: |
      upstream_base_url: "http://localhost:11434"

  # Ctx Untangler — computes diffs, stores in Ctx_graph_* CTE tags
  - mod_name: dt_provenance_dt_ctx_untangler
    pool_name: dt_ctx_untangler_pool
    pool_query: local
    pool_id: "820.0"

  # Conversation Tracker — stores interactions in CTE
  - mod_name: dt_provenance_dt_tracker
    pool_name: dt_tracker_pool
    pool_query: local
    pool_id: "810.0"
    config: |
