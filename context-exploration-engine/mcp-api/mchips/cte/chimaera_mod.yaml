# MChiP CTE — Context Transfer Engine MCP tools
# Exposes 12 CTE tools (put_blob, get_blob, etc.) as an MCP-compatible ChiMod.
# The gateway discovers this module and aggregates its tools with "cte__" prefix.

module_name: mchip_cte
namespace: mchips
version: 0.1.0
critical: false

# Inherited Methods
kCreate: 0
kDestroy: 1
kNodeFailure: -1
kRecover: -1
kMigrate: -1
kUpgrade: -1
kMonitor: 9

# MChiP Standard Methods (from SDK)
kListMcpTools: 10     # Return JSON array of ToolDefinitions
kCallMcpTool: 11      # Dispatch named tool, return JSON result
