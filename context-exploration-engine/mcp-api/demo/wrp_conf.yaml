# MChiPs Demo Configuration
# Chimaera runtime compose config for the MCP gateway + MChiP ChiMods.

# Runtime configuration
chimaera:
  num_workers: 4
  shm_size: "256M"

# MCP gateway HTTP settings (passed to gateway CreateParams)
mchips:
  host: "0.0.0.0"
  port: 8080
  http_threads: 4
  session_timeout_sec: 1800  # 30 minutes

# Compose — modules started automatically with the runtime
# Pool ID scheme: 700-799 reserved for MChiPs
compose:

  # === Block Device (DRAM) — required ===
  - mod_name: chimaera_bdev
    pool_name: "ram::chi_default_bdev"
    pool_query: local
    pool_id: "301.0"
    bdev_type: ram
    capacity: "512MB"

  # === CTE — required for cte MChiP ===
  - mod_name: wrp_cte_core
    pool_name: cte_main
    pool_query: local
    pool_id: "512.0"
    storage:
      - path: "ram::cte_ram_tier1"
        bdev_type: "ram"
        capacity_limit: "512MB"
        score: 1.0
    dpe:
      dpe_type: "max_bw"

  # === MCP Gateway ===
  - mod_name: mchips_mcp_gateway
    pool_name: mchips_gateway
    pool_query: local
    pool_id: "700.0"

  # === CTE MChiP ===
  - mod_name: mchips_mchip_cte
    pool_name: mchips_cte
    pool_query: local
    pool_id: "701.0"

  # === CAE MChiP ===
  - mod_name: mchips_mchip_cae
    pool_name: mchips_cae
    pool_query: local
    pool_id: "702.0"

  # === Cluster MChiP ===
  - mod_name: mchips_mchip_cluster
    pool_name: mchips_cluster
    pool_query: local
    pool_id: "703.0"
