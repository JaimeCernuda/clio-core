# MChiPs Demo Configuration
# Chimaera runtime compose config for the MCP gateway + MChiP ChiMods.

# Runtime configuration
# Use 8 workers so CTE pools (512, 701) land on different lanes/workers,
# avoiding deadlock when CallMcpTool blocks on CTE API futures.
chimaera:
  num_workers: 8
  shm_size: "256M"

# MCP gateway HTTP settings (passed to gateway CreateParams)
mchips:
  host: "0.0.0.0"
  port: 8080
  http_threads: 4
  session_timeout_sec: 1800  # 30 minutes

# Compose — modules started automatically with the runtime
# Pool ID scheme: 700-799 reserved for MChiPs
compose:

  # === Block Device (DRAM) — required ===
  - mod_name: chimaera_bdev
    pool_name: "ram::chi_default_bdev"
    pool_query: local
    pool_id: "301.0"
    bdev_type: ram
    capacity: "512MB"

  # === CTE — required for cte MChiP ===
  # pool_name must match kCtePoolName = "wrp_cte_core" so ClientInit finds it.
  - mod_name: wrp_cte_core
    pool_name: wrp_cte_core
    pool_query: local
    pool_id: "512.0"
    storage:
      - path: "ram::cte_ram_tier1"
        bdev_type: "ram"
        capacity_limit: "512MB"
        score: 1.0
    dpe:
      dpe_type: "max_bw"

  # MCP Gateway (700), CTE MChiP (701), CAE (702), Cluster (703) are created
  # manually in demo_server.cc so the gateway gets the correct port/threads
  # from command-line args.  Do not add them here.
